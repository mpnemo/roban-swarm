# Roban Swarm — dnsmasq config for provisioning captive portal
# Installed to /etc/roban-swarm/dnsmasq-setup.conf
#
# Provides DHCP + DNS wildcard so all domains resolve to the OPi,
# triggering captive portal detection on phones/laptops.

interface=wlan0
bind-interfaces

# DHCP pool
dhcp-range=192.168.4.10,192.168.4.50,255.255.255.0,12h

# Redirect ALL DNS queries to the AP IP (captive portal)
address=/#/192.168.4.1

# No upstream DNS (we ARE the DNS)
no-resolv
no-poll

# Disable default pid/lease files to avoid conflicts with system dnsmasq
pid-file=/run/dnsmasq-setup.pid
dhcp-leasefile=/tmp/dnsmasq-setup.leases

# Log to stdout (journald)
log-queries
log-dhcp
